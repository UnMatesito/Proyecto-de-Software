{% extends "auth_layout.html" %}

{% block title %}Página de Mantenimiento{% endblock %}

{% block header %}{% endblock %}

{% block content %}
<main class="flex items-center justify-center h-full bg-gray-100">
    <div class="bg-white shadow-lg rounded-xl p-6 text-center max-w-lg">
        <h1 class="text-2xl font-bold text-red-600 mb-4">🚧 Sitio en mantenimiento</h1>
        <p class="text-gray-700">{{ message }}</p>
        <a href="{{ url_for('auth.login') }}" class="text-white bg-proyecto-primary hover:bg-blue-800 focus:ring-4 focus:ring-proyecto-primary/20 font-semibold rounded-lg text-sm px-3 py-2 sm:px-5 sm:py-2.5 text-center inline-flex items-center {{ class }}">Iniciar sesion</a>
    </div>
</main>
{% endblock %}

{# macro for toast #}
{% macro toast(message="", type="", name="") %}
<div id="{{ name }}" class="flex items-center w-full max-w-xs p-4 mb-4 text-gray-500 bg-white rounded-lg shadow-sm dark:text-gray-400 dark:bg-gray-800" role="alert">
    {%  if type=="success" %}
        {# Success Icon #}
    <div class="inline-flex items-center justify-center shrink-0 w-8 h-8 text-green-500 bg-green-100 rounded-lg dark:bg-green-800 dark:text-green-200">
        <i class="fa-solid fa-circle-check"></i>
        <span class="sr-only">Icono de Exito</span>
    </div>
    {% elif type=="error" %}
        {# Error Icon #}
    <div class="inline-flex items-center justify-center shrink-0 w-8 h-8 text-red-500 bg-red-100 rounded-lg dark:bg-red-800 dark:text-red-200">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span class="sr-only">Icono de error</span>
    </div>
    {% elif type=="warning" %}
        {# Warning Icon #}
    <div class="inline-flex items-center justify-center shrink-0 w-8 h-8 text-orange-500 bg-orange-100 rounded-lg dark:bg-orange-700 dark:text-orange-200">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span class="sr-only">Icono de advertencia</span>
    </div>
    {% endif %}
    <div class="ms-3 text-sm font-normal">{{ message }}</div>
    <button type="button" class="ms-auto -mx-1.5 -my-1.5 bg-white text-gray-400 hover:text-gray-900 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-gray-100 inline-flex items-center justify-center h-8 w-8 dark:text-gray-500 dark:hover:text-white dark:bg-gray-800 dark:hover:bg-gray-700" data-dismiss-target="#{{ name }}" aria-label="Close">
        {# Close Icon #}
        <span class="sr-only">Cerrar</span>
        <i class="fa-solid fa-xmark"></i>
        <span class="sr-only">Cerrar Toast</span>
    </button>
</div>
{% endmacro %}

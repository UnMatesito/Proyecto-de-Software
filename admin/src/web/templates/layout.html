<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    {% block head %} {% endblock %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/habibmhamadi/multi-select-tag@4.0.1/dist/css/multi-select-tag.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/all.min.js" integrity="sha512-6BTOlkauINO65nLhXhthZMtepgJSghyimIalb+crKRPhvhmsCdnIuGcVbR5/aQY2A+260iC1OPy1oCdB6pSSwQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <title>{% block title %}Header de la pagina{% endblock %}</title>
</head>

<body class="flex flex-col min-h-screen">
    <header class="bg-gray-700 text-white">
        {% block header %}{% endblock %}
    </header>

    <main class="flex-grow p-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gray-700 text-white text-center p-6">
        <h3> Proyecto de software - Grupo 09</h3>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/habibmhamadi/multi-select-tag@4.0.1/dist/js/multi-select-tag.min.js"></script>

</body>
</html>
